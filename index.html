<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip - Heads or Tails</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .coin-container {
            perspective: 1000px;
            margin: 40px 0;
        }

        .coin {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease-in-out;
            cursor: pointer;
            border-radius: 50%;
        }

        .coin:hover {
            transform: scale(1.05);
        }

        .coin.flipping {
            animation: flip 1s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(900deg); }
            100% { transform: rotateY(1800deg); }
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            backface-visibility: hidden;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border: 5px solid #ffd700;
        }

        .heads {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
        }

        .tails {
            background: linear-gradient(135deg, #c0c0c0 0%, #e6e6e6 100%);
            color: #1a1a2e;
            transform: rotateY(180deg);
        }

        .result {
            font-size: 2rem;
            margin: 30px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result.heads-result {
            color: #ffd700;
        }

        .result.tails-result {
            color: #c0c0c0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .history {
            margin: 30px 0;
        }

        .history h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }

        .history-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .history-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid;
        }

        .history-item.H {
            background: #ffd700;
            color: #1a1a2e;
            border-color: #ffd700;
        }

        .history-item.T {
            background: #c0c0c0;
            color: #1a1a2e;
            border-color: #c0c0c0;
        }

        .flip-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .flip-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        }

        .flip-btn:active {
            transform: translateY(0);
        }

        .flip-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            
            .coin {
                width: 150px;
                height: 150px;
            }
            
            .coin-face {
                font-size: 2rem;
            }
            
            .result {
                font-size: 1.5rem;
            }
            
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪙 Coin Flip</h1>
        
        <div class="coin-container">
            <div class="coin" id="coin">
                <div class="coin-face heads">H</div>
                <div class="coin-face tails">T</div>
            </div>
        </div>
        
        <div class="result" id="result">Click the coin to flip!</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="totalFlips">0</div>
                <div class="stat-label">Total Flips</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="headsPercent">0%</div>
                <div class="stat-label">Heads</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="tailsPercent">0%</div>
                <div class="stat-label">Tails</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="currentStreak">0</div>
                <div class="stat-label">Current Streak</div>
            </div>
        </div>
        
        <div class="history">
            <h3>Last 10 Flips</h3>
            <div class="history-container" id="historyContainer">
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
                <div class="history-item" style="opacity: 0.3;">-</div>
            </div>
        </div>
        
        <button class="flip-btn" id="flipBtn" onclick="flipCoin()">Flip Again</button>
    </div>

    <script>
        let totalFlips = 0;
        let headsCount = 0;
        let tailsCount = 0;
        let currentStreak = 0;
        let lastResult = null;
        let history = [];

        function flipCoin() {
            const coin = document.getElementById('coin');
            const result = document.getElementById('result');
            const flipBtn = document.getElementById('flipBtn');
            
            // Disable button during flip
            flipBtn.disabled = true;
            
            // Add flip animation
            coin.classList.add('flipping');
            
            // Generate random result
            const isHeads = Math.random() < 0.5;
            
            setTimeout(() => {
                // Update result
                if (isHeads) {
                    result.textContent = '🎉 HEADS!';
                    result.className = 'result heads-result';
                    headsCount++;
                } else {
                    result.textContent = '🎯 TAILS!';
                    result.className = 'result tails-result';
                    tailsCount++;
                }
                
                // Update stats
                totalFlips++;
                updateStreak(isHeads ? 'H' : 'T');
                updateHistory(isHeads ? 'H' : 'T');
                updateStats();
                
                // Remove animation and re-enable button
                coin.classList.remove('flipping');
                flipBtn.disabled = false;
                
                // Add a little celebration effect
                if (currentStreak >= 5) {
                    document.body.style.background = 'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)';
                    setTimeout(() => {
                        document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)';
                    }, 1000);
                }
            }, 1000);
        }

        function updateStreak(result) {
            if (lastResult === result) {
                currentStreak++;
            } else {
                currentStreak = 1;
            }
            lastResult = result;
        }

        function updateHistory(result) {
            history.unshift(result);
            if (history.length > 10) {
                history.pop();
            }
            
            const historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                if (i < history.length) {
                    item.textContent = history[i];
                    item.classList.add(history[i]);
                    item.style.opacity = '1';
                } else {
                    item.textContent = '-';
                    item.style.opacity = '0.3';
                }
                
                historyContainer.appendChild(item);
            }
        }

        function updateStats() {
            document.getElementById('totalFlips').textContent = totalFlips;
            document.getElementById('headsPercent').textContent = 
                totalFlips > 0 ? Math.round((headsCount / totalFlips) * 100) + '%' : '0%';
            document.getElementById('tailsPercent').textContent = 
                totalFlips > 0 ? Math.round((tailsCount / totalFlips) * 100) + '%' : '0%';
            document.getElementById('currentStreak').textContent = currentStreak;
        }

        // Add click event to coin
        document.getElementById('coin').addEventListener('click', flipCoin);
        
        // Add keyboard support
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' && !document.getElementById('flipBtn').disabled) {
                e.preventDefault();
                flipCoin();
            }
        });
    </script>
</body>
</html>
